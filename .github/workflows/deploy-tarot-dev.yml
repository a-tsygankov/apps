name: Deploy Tarot Dev

on:
  push:
    branches: [main]
    paths:
      - 'tarot-dev/**'
      - 'shared/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tarot-dev/package-lock.json

      - name: Install dependencies
        working-directory: tarot-dev
        run: npm ci

      - name: Type check
        working-directory: tarot-dev
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: tarot-dev
        run: npm test

      - name: Build
        working-directory: tarot-dev
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: tarot-dev/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
